<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — HareHill OBM.">
  <meta name="robots" content="noindex">
  <title>Page not found | HareHill OBM</title>
  <link rel="icon" type="image/png" href="img/hare.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- NAV -->
  <header class="nav" id="nav">
    <div class="nav__inner container">
      <a href="index.html" class="nav__logo">
        <img src="img/HareHill%20Logo.png" alt="Hare Hill" class="nav__logo-img">
      </a>
      <button class="nav__hamburger" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav__links">
        <a href="services.html">Services</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
        <a href="index.html#contact">Contact</a>
        <a href="index.html#contact" class="btn nav__cta">Contact us</a>
      </nav>
    </div>
  </header>

  <!-- 404 -->
  <section class="not-found" id="main">
    <div class="container not-found__inner">
      <img src="img/hare.png" alt="" aria-hidden="true" class="not-found__hare">
      <p class="not-found__eyebrow">404</p>
      <h1 class="not-found__headline">Looks like this path leads&nbsp;nowhere.</h1>
      <p class="not-found__sub">The page you're looking for has wandered off. Let's get you back on track.</p>
      <nav class="not-found__links" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer__inner">
      <div class="footer__logo">
        <img src="img/hare.png" alt="Hare Hill" class="footer__hare">
        <span>HareHill OBM</span>
      </div>
      <nav class="footer__links">
        <a href="services.html">Services</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('nav--scrolled', window.scrollY > 10);
    }, { passive: true });

    const toggle = document.getElementById('nav-toggle');
    const navLinks = document.querySelector('.nav__links');
    toggle.addEventListener('click', () => {
      const open = navLinks.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', open);
    });
    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navLinks.classList.remove('is-open');
        toggle.setAttribute('aria-expanded', 'false');
      });
    });
  </script>

</body>
</html>
